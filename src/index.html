<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk</title>
    <link rel="stylesheet" href="../dist/css/style.min.css">
</head>
<body>
    <header>
        <div class="container">

                    <a href="#" class="logo_img"><img src="img/logo/logo.svg" alt="logo"></a>

                    <ul class="menu__list">
